services:
  - type: web
    name: codexis
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_DISABLED
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      # If you add a Render Postgres database, link it and set DATABASE_URL.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: codexis-db
      #     property: connectionString

databases:
  - name: codexis-db
    plan: free
    databaseName: codexis
    user: codexis
